<DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>ChloeWeb</title>
		<link rel="icon" href="img/favicon.ico">
		<link rel="stylesheet" href="global.css">
		<link rel="stylesheet" href="password_styles.css">
		<script type="text/javascript" src="scripts/password.js"></script>
</head>
<body>
    <div class="password-container">
        <p style="font-size:25">Welcome to the ChloeWeb</p>
		<img src="img/sub.png" alt="sub-line" width="400">

        <p>Please enter the password to access:</p>
		<span style="cursor:pointer" onclick="document.getElementById('hint').hidden = !document.getElementById('hint').hidden">(hint)</span>
			<div hidden id="hint">
				<b style="color:#FE019A">m</b>any birds <b style="color:#FE019A">o</b>ften eat <b style="color:#FE019A">n</b>uts by <b style="color:#FE019A">o</b>pening the shells with their specialised beaks.
			</div>
		<br>
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="checkPassword()">Submit</button>
        <p id="message"></p>
		<a style="color:white" href="main.html"><img src="img/black.png"></a>
    </div>
</body>
</html>
